<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZonaProp → Ficha limpia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background: #F7F5F0;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      padding: 48px 44px 40px;
      max-width: 600px;
      width: 100%;
      border-top: 4px solid #C8A96A;
    }

    .logo {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C8A96A;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Georgia', serif;
      font-size: 1.9rem;
      font-weight: 400;
      color: #1A1A2E;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #7A7060;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6B5B45;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #D8D0C4;
      border-radius: 2px;
      font-size: 15px;
      color: #1A1A1A;
      background: #FAFAF8;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Arial', sans-serif;
    }

    input[type="text"]:focus {
      border-color: #C8A96A;
      background: #fff;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 15px;
      background: #1A1A2E;
      color: #F7F5F0;
      border: none;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Arial', sans-serif;
    }

    button:hover:not(:disabled) { background: #2C2C4A; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status */
    .status {
      margin-top: 28px;
      display: none;
    }

    .status.visible { display: block; }

    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #6B5B45;
      font-size: 14px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid #E0D8CC;
      border-top-color: #C8A96A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #FDF2F2;
      border-left: 3px solid #D9534F;
      padding: 14px 16px;
      font-size: 14px;
      color: #8B2020;
      border-radius: 0 2px 2px 0;
    }

    .success-box {
      background: #F2FDF5;
      border-left: 3px solid #C8A96A;
      padding: 18px 20px;
      border-radius: 0 2px 2px 0;
    }

    .success-box .meta {
      font-size: 13px;
      color: #4A6741;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .success-box .meta strong {
      display: block;
      font-size: 15px;
      color: #1A1A2E;
      margin-bottom: 4px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tag {
      background: #EDE9E0;
      color: #6B5B45;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 1px;
      font-weight: 600;
    }

    .btn-download {
      display: inline-block;
      margin-top: 4px;
      padding: 12px 24px;
      background: #C8A96A;
      color: #1A1A2E;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      border: none;
      font-family: 'Arial', sans-serif;
      transition: background 0.2s;
      width: 100%;
      text-align: center;
    }

    .btn-download:hover { background: #B8954F; }

    .btn-preview {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      background: transparent;
      color: #1A1A2E;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 2px;
      border: 1.5px solid #D8D0C4;
      font-family: 'Arial', sans-serif;
      transition: border-color 0.2s;
      width: 100%;
      text-align: center;
      cursor: pointer;
    }
    .btn-preview:hover { border-color: #C8A96A; }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #B0A898;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">ZonaProp Tools</div>
  <h1>Ficha limpia de propiedad</h1>
  <p class="subtitle">Pegá un link de ZonaProp y obtenés una página con fotos, características y descripción, sin datos de contacto con la inmobiliaria.</p>

  <label for="url-input">Link de ZonaProp</label>
  <input
    type="text"
    id="url-input"
    placeholder="https://www.zonaprop.com.ar/propiedades/..."
    autocomplete="off"
    spellcheck="false"
  >
  <button id="btn-scrape" onclick="scrape()">Generar ficha</button>

  <div class="status" id="status">
    <!-- content injected by JS -->
  </div>
</div>

<footer>Solo funciona con links de zonaprop.com.ar</footer>

<!-- Preview modal -->
<div id="preview-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:999; overflow:auto; padding:20px;">
  <div style="background:#fff; max-width:1100px; margin:0 auto; border-radius:2px; position:relative; min-height:200px;">
    <button onclick="closePreview()" style="position:sticky; top:0; float:right; background:#1A1A2E; color:#fff; border:none; padding:10px 18px; cursor:pointer; font-size:18px; z-index:1; border-radius:0 2px 0 0; width:auto; text-transform:none; letter-spacing:0; font-weight:400;">✕ Cerrar</button>
    <iframe id="preview-frame" style="width:100%; min-height:90vh; border:none;" title="Vista previa"></iframe>
  </div>
</div>

<script>
  let lastHtml = "";

  document.getElementById('url-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') scrape();
  });

  function setStatus(html) {
    const el = document.getElementById('status');
    el.innerHTML = html;
    el.classList.add('visible');
  }

  async function scrape() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    const btn = document.getElementById('btn-scrape');
    btn.disabled = true;
    lastHtml = "";

    setStatus(`
      <div class="loading">
        <div class="spinner"></div>
        <span>Accediendo a ZonaProp… esto puede tomar unos segundos.</span>
      </div>
    `);

    try {
      const res = await fetch('/scrape', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        setStatus(`<div class="error-box">⚠️ ${data.error || 'Error desconocido.'}</div>`);
        return;
      }

      lastHtml = data.html_content;

      const tags = [];
      if (data.images_count > 0) tags.push(`📷 ${data.images_count} fotos`);
      if (data.features_count > 0) tags.push(`📋 ${data.features_count} características`);
      if (data.price) tags.push(`💰 ${data.price}`);

      const tagsHtml = tags.map(t => `<span class="tag">${t}</span>`).join('');

      setStatus(`
        <div class="success-box">
          <div class="meta">
            <strong>${data.title || 'Propiedad'}</strong>
            ${data.address || ''}
          </div>
          <div class="tags">${tagsHtml}</div>
          <button class="btn-download" onclick="downloadHtml()">⬇ Descargar ficha HTML</button>
          <button class="btn-preview" onclick="openPreview()">👁 Vista previa</button>
        </div>
      `);

    } catch (err) {
      setStatus(`<div class="error-box">⚠️ No se pudo conectar con el servidor. ¿Está corriendo server.py?</div>`);
    } finally {
      btn.disabled = false;
    }
  }

  function downloadHtml() {
    if (!lastHtml) return;
    const blob = new Blob([lastHtml], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'propiedad.html';
    a.click();
  }

  function openPreview() {
    if (!lastHtml) return;
    const modal = document.getElementById('preview-modal');
    const frame = document.getElementById('preview-frame');
    modal.style.display = 'block';
    frame.srcdoc = lastHtml;
    document.body.style.overflow = 'hidden';
  }

  function closePreview() {
    document.getElementById('preview-modal').style.display = 'none';
    document.body.style.overflow = '';
  }
</script>

</body>
</html>
